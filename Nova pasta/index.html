<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tio piku</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <h1>testando JS</h1>

    <div class="bloco">
        <h2>Realizando alteração no HTML com JS</h2>
        <p id="mensagem">abrir mensagem</p>
        <button onclick="revelarMensagem()">Revelar mensagem</button>
        <br> <br>
    </div>
    
    <div class="bloco">
        <h2>Testando alterações usando variáveis</h2>
        <label for="nome">Digite seu nome:</label>
        <input type="text" id="nomeUsuario">
        <br> <br>
        <button onclick="mostrarNome()">Atualizar nome</button>
        <br> <br>

        <p id="resultadoNome">seu nome aparecerá aqui.</p>
    </div>    
    
    <script src="script.js"></script>

</body>
</html>
